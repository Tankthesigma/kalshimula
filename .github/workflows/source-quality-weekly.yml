name: Source Quality (live)

# Live-API smoke against NWS / NCEI / POWER across every configured city.
# Intentionally separate from CI: this hits real external services and would
# add minutes + flakiness to every PR if wired into the normal test gate.
# Runs on a schedule + manual trigger only, never blocks merges, and uploads
# the raw smoke CSVs as artifacts plus a markdown table to the run summary.

on:
  schedule:
    # Monday 14:00 UTC (mid-morning US Eastern, mid-afternoon UK).
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'YYYY-MM-DD to probe (defaults to 7 days ago, which is past all source publish lags).'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  smoke:
    name: Live source smoke + quality report
    runs-on: ubuntu-latest
    # Belt-and-suspenders: this job exists to surface external-source
    # regressions, not to gate merges. continue-on-error keeps the overall
    # workflow green even when a source is down upstream.
    continue-on-error: true
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target date
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "date=${{ github.event.inputs.target_date }}" >> "$GITHUB_OUTPUT"
          else
            # 7 days ago — past all known publish lags (NCEI ~1-3d, POWER ~3-5d).
            echo "date=$(date -u -d '7 days ago' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke all configured cities
        env:
          NWS_USER_AGENT: weather-predictor-ci/1.0 (ci-monitoring)
        run: |
          mkdir -p data
          python -m src.smoke_weather_cli \
            --date "${{ steps.target.outputs.date }}" \
            --out data/smoke_all.csv || true
          ls -la data/

      - name: Build source-quality summary
        run: |
          python -m src.source_quality_cli \
            --input data/smoke_all.csv \
            --out data/quality_all.csv

      - name: Render run summary
        run: |
          {
            echo "# Source quality — ${{ steps.target.outputs.date }}"
            echo ""
            echo "## Per-source rollup"
            echo ""
            echo '```'
            cat data/quality_all.csv
            echo '```'
            echo ""
            echo "## Per-city detail"
            echo ""
            echo '```'
            cat data/smoke_all.csv
            echo '```'
            echo ""
            echo "_Generated by \`.github/workflows/source-quality-weekly.yml\`. This job is non-blocking — failures here flag external API drift, not code regressions._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-quality-${{ steps.target.outputs.date }}
          path: |
            data/smoke_all.csv
            data/quality_all.csv
          if-no-files-found: warn
          retention-days: 90
