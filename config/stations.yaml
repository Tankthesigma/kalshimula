# Kalshi settlement stations. Settlement is daily-max temperature
# in Local Standard Time (NO DST) — that's why every offset below is
# the station's *standard* time offset year-round.
#
# `ghcnd_id` strings include the `GHCND:` prefix expected by NCEI CDO.
# The new Access Data Service wants the bare station id (e.g.
# USW00094728); strip the prefix at call time.

cities:
  nyc:
    name: New York City
    nws_station: KNYC
    ghcnd_id: GHCND:USW00094728
    lat: 40.7794
    lon: -73.9692
    tz: America/New_York
    lst_offset_hours: -5
